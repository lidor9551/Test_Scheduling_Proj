name: Build and Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  windows-debug:
    name: Windows Debug Build + CTest
    runs-on: windows-2022

    env:
      QT_VERSION: "6.8.0"
      QT_ARCH: "win64_msvc2022_64"
      QT_DIR: "C:\\Qt\\6.8.0\\msvc2022_64"
      QT_QPA_PLATFORM: "offscreen"
      QT_QUICK_CONTROLS_STYLE: "Basic"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python for Qt installer
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Qt
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall
          python -m aqt install-qt windows desktop $env:QT_VERSION $env:QT_ARCH -O C:\Qt

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_PREFIX_PATH="$env:QT_DIR" `
            -DBUILD_TESTING=ON

      - name: Build Debug
        shell: pwsh
        run: |
          cmake --build build --config Debug --parallel

      - name: Run CTest
        shell: pwsh
        run: |
          $env:PATH = "$env:QT_DIR\bin;$env:PATH"
          ctest --test-dir build -C Debug --output-on-failure